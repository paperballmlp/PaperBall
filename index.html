<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperBall</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

header{
  padding:10px;
  font-size:22px;
  font-weight:bold;
}

input{
  width:40%;
  padding:8px;
  font-size:16px;
  text-align:center;
  border-radius:8px;
  border:none;
}

.board{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
  margin:10px;
}

.cell{
  background:#111;
  padding:15px;
  font-size:20px;
  border:1px solid white;
}

.team{
  font-size:22px;
  font-weight:bold;
}

.score{
  font-size:50px;
}

button{
  padding:12px;
  margin:5px;
  font-size:16px;
  border:none;
  border-radius:8px;
}

.add{background:green;color:white;}
.remove{background:red;color:white;}
.save{background:blue;color:white;}

#controls{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.section{
  margin-top:20px;
  padding:10px;
  background:#111;
}

.rank{
  text-align:left;
  padding:10px;
}
</style>
</head>

<body>

<header>⚾ PAPERBALL ⚾</header>

<div>
  <input id="teamA" placeholder="Cañeros">
  <span style="font-size:30px;">VS</span>
  <input id="teamB" placeholder="Ice Cub">
</div>

<div class="score" id="scoreA">0</div>
<div class="score" id="scoreB">0</div>

<div class="board" id="board"></div>

<div id="controls">
  <button class="add" onclick="addRun(0)">+ A</button>
  <button class="add" onclick="addRun(1)">+ B</button>
  <button class="remove" onclick="removeRun(0)">- A</button>
  <button class="remove" onclick="removeRun(1)">- B</button>
</div>

<br>

<button class="save" onclick="endGame()">TERMINAR PARTIDO</button>

<div class="section">
  <h2>🏆 RANKING</h2>
  <div id="ranking"></div>
</div>

<div class="section">
  <h2>🏆 TORNEO</h2>
  <p>Octavos → Cuartos → Semifinal → Final</p>
</div>

<script>
let scoreA = 0;
let scoreB = 0;
let inning = 1;
let maxInnings = 7;

let history = JSON.parse(localStorage.getItem("paperball_history") || "[]");

const board = document.getElementById("board");

function drawBoard(){
  board.innerHTML = "";
  for(let i=1;i<=7;i++){
    board.innerHTML += `<div class="cell">${i}</div>`;
  }
  board.innerHTML += `<div class="cell">EX</div>`;
}

drawBoard();

function playSound(){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.type = "square";
  osc.frequency.value = 600;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

function update(){
  document.getElementById("scoreA").innerText = scoreA;
  document.getElementById("scoreB").innerText = scoreB;

  if(inning > maxInnings && scoreA === scoreB){
    maxInnings++; // extra innings
  }

  localStorage.setItem("paperball_live", JSON.stringify({scoreA,scoreB,inning}));
}

function addRun(team){
  if(team===0) scoreA++;
  if(team===1) scoreB++;
  playSound();
  update();
}

function removeRun(team){
  if(team===0 && scoreA>0) scoreA--;
  if(team===1 && scoreB>0) scoreB--;
  update();
}

function endGame(){
  let teamA = document.getElementById("teamA").value || "Cañeros";
  let teamB = document.getElementById("teamB").value || "Ice Cub";

  let winner = scoreA > scoreB ? teamA : teamB;
  let record = scoreA > scoreB ? `${scoreA}-${scoreB}` : `${scoreB}-${scoreA}`;

  history.push({winner,record});

  history.sort((a,b)=>{
    return parseInt(b.record) - parseInt(a.record);
  });

  localStorage.setItem("paperball_history", JSON.stringify(history));

  renderRanking();

  alert("Partido terminado: " + winner + " gana " + record);
}

function renderRanking(){
  let div = document.getElementById("ranking");
  div.innerHTML = "";
  history.forEach((h,i)=>{
    div.innerHTML += `<p>${i+1}. ${h.winner} (${h.record})</p>`;
  });
}

renderRanking();

// cargar estado guardado
let saved = JSON.parse(localStorage.getItem("paperball_live"));
if(saved){
  scoreA = saved.scoreA;
  scoreB = saved.scoreB;
  inning = saved.inning;
  update();
}
</script>

</body>
